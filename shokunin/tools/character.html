<!DOCTYPE html><html><head><meta charset="utf-8"><style>html,body{margin:0;background:transparent}</style></head>
<body>
<svg width="600" height="760" viewBox="0 0 600 760" xmlns="http://www.w3.org/2000/svg">
  <!-- 若手大工「匠（たくみ）」：頼りがいのある若い職人（正面・挨拶で片手を上げる。ヘルメットあご紐なし） -->

  <!-- 体：オレンジの作業シャツ＋ネイビーの作業ズボン（肩幅広めでがっしり） -->
  <path d="M198 470 Q300 438 402 470 L414 620 Q300 650 186 620 Z" fill="#ea580c"/>
  <!-- シャツの前立て・ボタン -->
  <path d="M300 452 L300 630" stroke="#c2410c" stroke-width="5"/>
  <circle cx="300" cy="500" r="5" fill="#c2410c"/>
  <circle cx="300" cy="545" r="5" fill="#c2410c"/>
  <circle cx="300" cy="590" r="5" fill="#c2410c"/>
  <!-- 襟 -->
  <path d="M266 452 L300 486 L334 452 L316 444 L300 458 L284 444 Z" fill="#c2410c"/>
  <!-- 胸ポケット＋鉛筆 -->
  <rect x="322" y="500" width="46" height="40" rx="6" fill="#d95207"/>
  <rect x="330" y="486" width="9" height="26" rx="3" fill="#ffd35c" transform="rotate(6 334 499)"/>

  <!-- 腰の道具ベルト -->
  <rect x="208" y="612" width="184" height="26" rx="10" fill="#8a5a2b"/>
  <rect x="284" y="612" width="32" height="26" rx="5" fill="#6f4620"/>

  <!-- 左腕（下ろしてハンマーの柄を握る） -->
  <path d="M210 478 Q176 520 170 574 Q168 592 185 596 Q201 599 207 582 Q219 536 242 504 Z" fill="#ea580c"/>
  <!-- カケヤ（掛矢＝木製の大槌・1つ。柄の中ほどを握る） -->
  <g transform="rotate(14 181 592)">
    <!-- 柄（木・手の上下に伸びる） -->
    <rect x="173" y="556" width="16" height="142" rx="7" fill="#dcb684"/>
    <path d="M181 562 L181 690" stroke="#b98e56" stroke-width="2" fill="none" opacity=".7"/>
    <!-- 頭（木製の太い円筒・横向き） -->
    <rect x="134" y="506" width="94" height="56" rx="26" fill="#c79a5b"/>
    <!-- 木目 -->
    <path d="M148 524 Q181 517 214 524" stroke="#a9733f" stroke-width="2.5" fill="none" opacity=".55"/>
    <path d="M146 536 Q181 531 216 536" stroke="#a9733f" stroke-width="2.5" fill="none" opacity=".5"/>
    <path d="M148 548 Q181 542 214 548" stroke="#a9733f" stroke-width="2.5" fill="none" opacity=".5"/>
    <!-- 箍（たが・補強の帯） -->
    <rect x="151" y="506" width="7" height="56" rx="3" fill="#8a5a2b" opacity=".5"/>
    <rect x="204" y="506" width="7" height="56" rx="3" fill="#8a5a2b" opacity=".5"/>
    <!-- 打面の木口（右・年輪） -->
    <ellipse cx="221" cy="534" rx="9" ry="26" fill="#e3c391"/>
    <ellipse cx="221" cy="534" rx="4.5" ry="16" fill="#c79a5b" opacity=".6"/>
    <!-- 打面の木口（左） -->
    <ellipse cx="141" cy="534" rx="9" ry="26" fill="#e3c391"/>
    <ellipse cx="141" cy="534" rx="4.5" ry="16" fill="#c79a5b" opacity=".6"/>
    <!-- 柄を握る手（前面に描画） -->
    <circle cx="181" cy="592" r="20" fill="#f2c9a4"/>
  </g>

  <!-- ズボン・足 -->
  <rect x="250" y="632" width="36" height="72" rx="14" fill="#2f4a6e"/>
  <rect x="314" y="632" width="36" height="72" rx="14" fill="#2f4a6e"/>
  <ellipse cx="266" cy="718" rx="32" ry="16" fill="#4d3a26"/>
  <ellipse cx="336" cy="718" rx="32" ry="16" fill="#4d3a26"/>

  <!-- 顔（少し角のある輪郭・若い男性） -->
  <path d="M162 330 Q160 218 232 186 Q300 162 368 186 Q440 218 438 330 Q436 412 380 444 Q300 478 220 444 Q164 412 162 330 Z" fill="#f7d5ae"/>
  <!-- 耳 -->
  <ellipse cx="160" cy="340" rx="16" ry="22" fill="#f7d5ae"/>
  <ellipse cx="440" cy="340" rx="16" ry="22" fill="#f7d5ae"/>

  <!-- 短髪（黒めの茶・襟足とサイド） -->
  <path d="M160 320 Q152 210 236 176 Q300 152 364 176 Q448 210 440 320 Q436 290 420 272 Q424 300 414 312 Q404 268 376 252 Q384 286 372 300 Q352 256 300 252 Q248 256 228 300 Q216 286 224 252 Q196 268 186 312 Q176 300 180 272 Q164 290 160 320 Z" fill="#3c2a1c"/>

  <!-- ヘルメット（黄色・あご紐なし） -->
  <path d="M164 246 Q174 140 300 134 Q426 140 436 246 Q438 258 426 258 L174 258 Q162 258 164 246 Z" fill="#ffd35c"/>
  <path d="M154 258 L446 258 Q460 258 458 272 Q456 284 442 284 L158 284 Q144 284 142 272 Q140 258 154 258 Z" fill="#f5b731"/>
  <rect x="282" y="140" width="36" height="56" rx="12" fill="#f5b731"/>
  <circle cx="300" cy="222" r="21" fill="#fff"/>
  <text x="300" y="230" font-family="Yu Gothic UI, sans-serif" font-size="21" font-weight="bold" fill="#ea580c" text-anchor="middle">大</text>

  <!-- 眉（にこにこ眉毛・やさしく上に弧を描く） -->
  <path d="M214 318 Q248 300 282 316" stroke="#3c2a1c" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M318 316 Q352 300 386 318" stroke="#3c2a1c" stroke-width="9" fill="none" stroke-linecap="round"/>
  <!-- 目 -->
  <g>
    <ellipse cx="248" cy="352" rx="17" ry="22" fill="#2b1d12"/>
    <circle cx="253" cy="344" r="6" fill="#fff"/>
    <ellipse cx="352" cy="352" rx="17" ry="22" fill="#2b1d12"/>
    <circle cx="357" cy="344" r="6" fill="#fff"/>
  </g>
  <!-- 鼻 -->
  <path d="M300 372 Q306 388 298 396" stroke="#d9a878" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- 口（落ち着いた笑顔） -->
  <path d="M276 416 Q300 432 324 416" stroke="#b3552e" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- 右腕：挨拶（開いた手を肩の高さに・前面） -->
  <path d="M390 480 Q452 456 486 402 Q496 386 483 376 Q469 367 459 382 Q428 428 372 452 Z" fill="#ea580c"/>
  <g transform="rotate(-10 496 362)">
    <circle cx="496" cy="362" r="25" fill="#f2c9a4"/>
    <rect x="475" y="330" width="12" height="28" rx="6" fill="#f2c9a4"/>
    <rect x="490" y="323" width="12" height="32" rx="6" fill="#f2c9a4"/>
    <rect x="505" y="328" width="12" height="28" rx="6" fill="#f2c9a4"/>
    <rect x="518" y="340" width="11" height="22" rx="5" fill="#f2c9a4"/>
  </g>
</svg>
</body></html>
